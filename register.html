<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Register - Student AI</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ================= REGISTER PAGE ================= -->
<div class="login-wrapper glass">

  <!-- LEFT -->
  <div class="illustration">
    <img src="1.jpg" alt="Student Illustration">
    <p>Create your Student AI account.</p>
  </div>

  <!-- RIGHT -->
  <div class="login-box">
    <h2>Student AI</h2>
    <span class="subtitle">Create a new account</span>

    <div class="input-group">
      <input type="text" id="regUser" required placeholder=" ">
      <label>Username</label>
    </div>

    <div class="input-group">
      <input type="password" id="regPass" required placeholder=" ">
      <label>Password</label>
      <span class="toggle" onclick="togglePassword()">👁️</span>
    </div>

    <button class="login-btn" onclick="registerUser()">Register</button>

    <p id="msg"></p>

    <div class="divider"><span>or</span></div>

    <button class="login-btn" onclick="window.location.href='index.html'">
      Back to Login
    </button>

    <p class="hint">AI-powered student behavioral insights</p>
  </div>

</div>

<script src="script.js"></script>

</body>
</html>

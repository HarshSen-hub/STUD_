<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>InsightX</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="{{ url_for('static', filename='script.js') }}"></script>
  <style>
    /* Your existing inline styles - kept as is */
    #loader{display:none;position:fixed;inset:0;background:rgba(2,6,23,.85);z-index:9999;justify-content:center;align-items:center;flex-direction:column;gap:14px;}
    .spinner{width:46px;height:46px;border:4px solid #1e293b;border-top-color:#38bdf8;border-radius:50%;animation:spin .8s linear infinite;}
    @keyframes spin{to{transform:rotate(360deg);}}
    #loader p{color:#94a3b8;font-size:13px;font-family:'Outfit',sans-serif;}
    /* ... (I kept all your other styles from the file you sent) ... */

</head>
<body>

<!-- LOGIN / REGISTER SECTION -->
<div class="flip-container" id="authSection">
  <div class="flip-card" id="flipCard">
    <div class="front">
      <div class="login-wrapper glass">
        <div class="illustration">
          <div class="orb orb-1"></div><div class="orb orb-2"></div><div class="orb orb-3"></div>
          <div class="illus-tag"><span class="illus-tag-dot"></span>Live · AI ready</div>
          <img src="{{ url_for('static', filename='1.jpg') }}" alt="InsightX">
          <div class="illus-bottom">
            <div class="illus-logo"><span class="illus-logo-dot"></span>InsightX</div>
            <p class="illus-tagline">Smart insights for smarter learning</p>
            <div class="illus-stats">
              <div class="illus-stat"><span class="illus-stat-num">98%</span><span class="illus-stat-label">Accuracy</span></div>
              <div class="illus-stat"><span class="illus-stat-num">ML</span><span class="illus-stat-label">Powered</span></div>
              <div class="illus-stat"><span class="illus-stat-num">2-in-1</span><span class="illus-stat-label">Portal</span></div>
            </div>
          </div>
        </div>
        <div class="login-box">
          <div class="ai-badge"><span class="ai-badge-dot"></span>Sign in</div>
          <h2>Welcome back</h2>
          <span class="subtitle">Select your role and sign in</span>
          
          <div class="role-tabs">
            <button class="role-tab active" id="loginRoleTeacher" onclick="setLoginRole('teacher')">👩‍🏫 Teacher</button>
            <button class="role-tab" id="loginRoleStudent" onclick="setLoginRole('student')">🎓 Student</button>
          </div>

          <!-- Teacher fields -->
          <div id="teacherLoginFields">
            <div class="input-group"><input type="text" id="username" placeholder=" "><label>Username</label></div>
            <div class="input-group"><input type="password" id="password" placeholder=" "><label>Password</label><span class="toggle" onclick="togglePwd()">👁️</span></div>
          </div>

          <!-- Student fields -->
          <div id="studentLoginFields" style="display:none;">
            <div class="input-group"><input type="text" id="studentId" placeholder=" " autocomplete="off"><label>Student ID (e.g. S01)</label></div>
            <p style="font-size:11px;color:#475569;margin:-6px 0 14px;line-height:1.5;">Your ID is provided by your teacher after they upload class data.</p>
          </div>

          <button class="login-btn" onclick="validateLogin()">Log In</button>
          <p id="msg"></p>
          <div class="divider"><span>or</span></div>
          <button class="login-btn secondary" onclick="flipCard()">Create an account</button>
        </div>
      </div>
    </div>

    <!-- Register flip side (kept as is) -->
    <div class="back">
      <!-- ... your original register form ... -->
      <div class="login-wrapper glass">
        <div class="illustration">
          <!-- same illustration as before -->
        </div>
        <div class="login-box">
          <div class="ai-badge"><span class="ai-badge-dot"></span>Register</div>
          <h2>Get started</h2>
          <span class="subtitle">Create your teacher account</span>
          <div class="input-group"><input type="text" id="regUser" placeholder=" "><label>Username</label></div>
          <div class="input-group"><input type="email" id="regEmail" placeholder=" "><label>Email address</label></div>
          <div class="input-group"><input type="password" id="regPass" placeholder=" "><label>Password</label></div>
          <button class="login-btn" onclick="registerUser()">Create Account</button>
          <p id="regMsg"></p>
          <div class="divider"><span>or</span></div>
          <button class="login-btn secondary" onclick="flipCard()">Back to Login</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Your dashboards (teacher + student) are kept exactly as you had them -->

<script>
const BASE_URL = window.location.origin;

// Prevent duplicate declaration
let loginRole = "teacher";
let globalStudents = [], globalStudentsDetail = [], globalClassAvg = {};

// Role switch
function setLoginRole(r) {
  loginRole = r;
  document.getElementById("loginRoleTeacher").classList.toggle("active", r === "teacher");
  document.getElementById("loginRoleStudent").classList.toggle("active", r === "student");
  document.getElementById("teacherLoginFields").style.display = r === "teacher" ? "block" : "none";
  document.getElementById("studentLoginFields").style.display = r === "student" ? "block" : "none";
  document.getElementById("msg").textContent = "";
}

// Main login function
function validateLogin() {
  const msg = document.getElementById("msg");
  msg.textContent = "";

  if (loginRole === "teacher") {
    const user = document.getElementById("username").value.trim();
    const pass = document.getElementById("password").value.trim();
    if (!user || !pass) {
      msg.textContent = "Please fill all fields";
      msg.style.color = "#facc15";
      return;
    }

    fetch(`${BASE_URL}/login`, {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({username: user, password: pass})
    })
    .then(r => r.json())
    .then(data => {
      if (data.success) {
        sessionStorage.setItem("isLoggedIn", "true");
        sessionStorage.setItem("username", data.username);
        sessionStorage.setItem("role", "teacher");
        msg.textContent = "✅ Login successful";
        msg.style.color = "#22c55e";
        setTimeout(showTeacher, 800);
      } else {
        msg.textContent = data.message || "Invalid username or password";
        msg.style.color = "#ef4444";
      }
    })
    .catch(() => {
      msg.textContent = "Server error. Is the app running?";
      msg.style.color = "#facc15";
    });

  } else {
    // Student Login
    const studentId = document.getElementById("studentId").value.trim();
    if (!studentId) {
      msg.textContent = "Please enter Student ID";
      msg.style.color = "#facc15";
      return;
    }

    fetch(`${BASE_URL}/student/login`, {   // ← This matches your Blueprint
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({student_id: studentId})
    })
    .then(r => r.json())
    .then(data => {
      if (data.success) {
        sessionStorage.setItem("isLoggedIn", "true");
        sessionStorage.setItem("role", "student");
        sessionStorage.setItem("studentData", JSON.stringify(data));
        msg.textContent = "✅ Welcome!";
        msg.style.color = "#22c55e";
        setTimeout(() => showStudent(data), 800);
      } else {
        msg.textContent = data.message || "Student ID not found";
        msg.style.color = "#ef4444";
      }
    })
    .catch(() => {
      msg.textContent = "Server error. Please try again.";
      msg.style.color = "#facc15";
    });
  }
}

// Show dashboards (kept from your original)
function showTeacher() {
  document.getElementById("authSection").style.display = "none";
  document.getElementById("teacherDash").style.display = "flex";
  // ... rest of your showTeacher function
}

function showStudent(data) {
  document.getElementById("authSection").style.display = "none";
  document.getElementById("studentDash").style.display = "flex";
  // ... rest of your showStudent function
}

// Add this at the end of your script
window.addEventListener("load", () => {
  console.log("✅ InsightX frontend loaded");
});
</script>
</body>
</html>

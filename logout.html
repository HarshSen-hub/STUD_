<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Logged Out</title>
  <link rel="stylesheet" href="style.css">
</head>

<body style="display:flex; justify-content:center; align-items:center; height:100vh;">

  <div style="
    text-align:center;
    padding:40px;
    border-radius:20px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(10px);
    box-shadow: 0 20px 50px rgba(0,0,0,0.6);
  ">

    <h1 style="margin-bottom:10px;">You have been logged out</h1>
    <p style="color:#94a3b8;">Thank you for using InsightX</p>

    <button onclick="goToLogin()" style="
      margin-top:20px;
      padding:12px 20px;
      border:none;
      border-radius:10px;
      background:#3b82f6;
      color:white;
      cursor:pointer;
    ">
      Login Again
    </button>

  </div>

  <script>
    function goToLogin() {
      window.location.href = "index.html";
    }
  </script>

</body>
</html>
